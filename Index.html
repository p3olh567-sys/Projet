<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · Leclerc</title>
    <style>
        /* ---- RESET & BASE ---- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f0f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 40px 35px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease;
        }
        .card:hover { transform: translateY(-4px); }
        .logo { display: flex; justify-content: center; margin-bottom: 28px; }
        .logo svg { width: 60px; height: 60px; }
        h2 { text-align: center; font-weight: 600; font-size: 26px; color: #1a2b3c; letter-spacing: -0.3px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #64748b; font-size: 15px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; font-size: 14px; color: #1e293b; margin-bottom: 6px; }
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            color: #0f172a;
        }
        .input-wrapper input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #ffffff;
        }
        .input-wrapper input::placeholder { color: #94a3b8; font-weight: 400; }
        .btn {
            width: 100%;
            padding: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            text-align: center;
            background: #f1f5f9;
            color: #1e293b;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; }
        .message.success { display: block; background: #dcfce7; color: #166534; }
        .footer-links {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .footer-links a { color: #64748b; text-decoration: none; transition: color 0.15s; }
        .footer-links a:hover { color: #2563eb; text-decoration: underline; }
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#2563eb" />
            <text x="50" y="64" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">L</text>
        </svg>
    </div>
    <h2>Bonjour</h2>
    <p class="subtitle">Connectez-vous à votre espace</p>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="email">Adresse email</label>
            <div class="input-wrapper">
                <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8">
            </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">Se connecter</button>
    </form>

    <div id="message" class="message"></div>

    <div class="footer-links">
        <a href="#">Mot de passe oublié ?</a>
        <a href="#">Créer un compte</a>
    </div>
</div>

<!-- ============ JAVASCRIPT INTÉGRÉ ============ -->
<script>
    (function() {
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            if (!text) {
                messageDiv.className = 'message';
                messageDiv.style.display = 'none';
            } else {
                messageDiv.style.display = 'block';
            }
        }

        emailInput.addEventListener('input', () => showMessage(''));
        passwordInput.addEventListener('input', () => showMessage(''));

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Veuillez remplir tous les champs.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    // Décommentez pour rediriger :
                    // window.location.href = '/dashboard';
                } else {
                    const errorMsg = data.error || 'Identifiants incorrects.';
                    showMessage('❌ ' + errorMsg, 'error');
                }
            } catch (error) {
                console.error('Erreur réseau :', error);
                showMessage('⚠️ Erreur de connexion au serveur.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });
    })();
</script>

</body>
</html>
